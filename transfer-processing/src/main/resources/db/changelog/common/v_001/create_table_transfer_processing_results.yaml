databaseChangeLog:
  - changeSet:
      id: create_table_transfer_processing_results
      author: DinaZ
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS transfer_processing_results (
              request_id VARCHAR(64) NOT NULL,
              event_id VARCHAR(64) NOT NULL,
              processing_status VARCHAR(32) NOT NULL,
              message VARCHAR(255),
              processed_at TIMESTAMP NOT NULL
              );